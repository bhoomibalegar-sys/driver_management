<!DOCTYPE html>
<html>
<head>
    <title>Driver Advance System</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🚚 Driver Advance System</h2>

    <!-- ADD DRIVER -->
    <h3>Add Driver</h3>
    <input type="text" id="new_driver" placeholder="Enter Driver Name">
    <button onclick="addDriver()">➕ Add Driver</button>

    <!-- ADD ADVANCE -->
    <h3>Add Advance</h3>

    <select id="driver_id"></select>

    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="reason" placeholder="Reason">
    <input type="date" id="advance_date">

    <button onclick="saveAdvance()">💾 Save Advance</button>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Driver</th>
                <th>Amount</th>
                <th>Reason</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="advanceBody">
            <tr><td colspan="4">No records yet</td></tr>
        </tbody>
    </table>

</div>

<script>

// LOAD DRIVERS
function loadDrivers() {
    fetch('get_drivers.php')
    .then(res => res.json())
    .then(data => {
        console.log("Drivers:", data); // 👈 DEBUG

        let dropdown = document.getElementById('driver_id');
        dropdown.innerHTML = '<option value="">Select Driver</option>';

        data.forEach(d => {
            dropdown.innerHTML += `<option value="${d.id}">${d.name}</option>`;
        });
    })
    .catch(err => console.error(err));
}

// ADD DRIVER
function addDriver() {
    let name = document.getElementById('new_driver').value;

    if (name === "") {
        alert("Enter driver name");
        return;
    }

    fetch('add_driver.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        document.getElementById('new_driver').value = "";
        loadDrivers();
    })
    .catch(err => console.error(err));
}

// SAVE ADVANCE
function saveAdvance() {
    let data = {
        driver_id: document.getElementById('driver_id').value,
        amount: document.getElementById('amount').value,
        reason: document.getElementById('reason').value,
        advance_date: document.getElementById('advance_date').value
    };

    fetch('save_advance.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        alert(res.message);
        loadAdvances();
    })
    .catch(err => console.error(err));
}

// LOAD ADVANCES
function loadAdvances() {
    fetch('get_advances.php')
    .then(res => res.json())
    .then(data => {
        let tbody = document.getElementById("advanceBody");

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4">No records yet</td></tr>`;
            return;
        }

        tbody.innerHTML = '';

        data.forEach(a => {
            tbody.innerHTML += `
                <tr>
                    <td>${a.name}</td>
                    <td>₹${a.amount}</td>
                    <td>${a.reason}</td>
                    <td>${a.advance_date}</td>
                </tr>
            `;
        });
    })
    .catch(err => console.error(err));
}

// INITIAL LOAD
loadDrivers();
loadAdvances();

</script>

</body>
</html>
